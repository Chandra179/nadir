services:
  app:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m

  qdrant:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g

  splade:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g

  reranker:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g

  grafana:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m

  node-exporter:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
