http:
  addr: ":8080"
  read_timeout: 5s
  write_timeout: 35s
  idle_timeout: 120s

middleware:
  timeout: 30s
  logger:
    level: dev  # dev | prod

knowledge_base:
  # path: "gitbook"           # legacy single dir; still works; override: NOTES_PATH
  paths:                    # additional markdown dirs (merged with path above)
    - "pdfs/converted"      # docling output dir

pkb:
  ignore_patterns:
    - ".gitbook/**"
    - ".git/**"
    - "node_modules/**"
    - "dist/**"
    - ".wrangler/**"
    - "scripts/**"
    - "diagrams/**"
    - ".claude/**"
    - "package.json"
    - "package-lock.json"
    - "*.config.js"
    - "*.jsonc"
    - "build.sh"
    - "CLAUDE.md"

qdrant:
  addr: "localhost:6334"
  collection: "pkb_chunks"
  top_k: 5

embedder:
  provider: "ollama"
  model: "nomic-embed-text"
  ollama_addr: "http://localhost:11434"
  dimensions: 768

chunker:
  provider: "recursive"  # recursive | sentence-window
  chunk_size: 512
  chunk_overlap: 64
  window_size: 3          # sentences before+after each sentence (sentence-window only)

retry:
  max_attempts: 3
  initial_interval: 500ms
  max_interval: 10s
  multiplier: 2.0

sparse_scorer:
  provider: "splade"  # tf (default, zero deps) | splade (requires cmd/splade sidecar)
  addr: "http://localhost:5001"

reranker:
  enabled: true       # set true + run: python cmd/reranker/main.py
  addr: "http://localhost:5002"
  candidate_mul: 10     # fetch topK*3 candidates before reranking

hyde:
  enabled: false      # set true to enable HyDE; uses ollama LLM to generate hypothetical doc per query
  ollama_addr: ""     # defaults to embedder.ollama_addr
  model: "gemma3:1b"
  num_docs: 1         # docs to generate per query (1=fast; paper uses 8 for max accuracy)

semantic_cache:
  enabled: true     # set true to enable; requires no extra infra (reuses Qdrant)
  collection: "pkb_cache"
  threshold: 0.90    # cosine similarity cutoff (0.85=permissive, 0.95=strict)
  ttl: 24h           # 0 = no expiry

eval:
  llm_base_url: "http://localhost:11434/v1"
  llm_model: "llama3.1:8b-instruct-q4_K_M"
  history_path: "eval_history.jsonl"

generator:
  enabled: true      # set true + ensure ollama LLM is pulled; POST /search with {"generate": true}
  ollama_addr: ""     # defaults to embedder.ollama_addr
  model: "phi4-mini:latest"  # LLM for answer generation; use instruct models
  max_context_tokens: 2800  # token budget for retrieved chunks (~70% of 4k ctx window)

docling:
  input_dir: "pdfs/raw"        # drop PDFs here
  output_dir: "pdfs/converted" # docling writes .md here; picked up on next ingest
