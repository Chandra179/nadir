global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: nadir
    static_configs:
      - targets: ["app:8080"]
    metrics_path: /metrics

  - job_name: nadir-local
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics
