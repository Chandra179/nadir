services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
